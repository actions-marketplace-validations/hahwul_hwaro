name: Cleanup old GHCR tags

on:
  schedule:
    - cron: '0 0 * * 0'   # 매주 일요일 자정
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Delete sha-* and old untagged versions
        uses: snok/container-retention-policy@v2
        with:
          image-names: hwaro
          account-type: user
          token: ${{ secrets.GITHUB_TOKEN }}
          # 아래 태그들만 남기고 나머지 전부 삭제
          keep-tags: |
            main
            latest
            v*
            [0-9]+.[0-9]+*
          keep-versions: 5          # 최근 5개 버전만 남김
          skip-tags: |
            latest
            main
